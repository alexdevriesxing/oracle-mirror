name = "oracle-mirror"
main = "dist/index.js"
compatibility_date = "2024-12-01"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "ORACLE_KV"
id = "b277f41b3df54315977eb7aa50c4e539"

# Refresh Oracle of Olympus fixtures/results every 2 hours.
# Live scores require the FOOTBALL_DATA_API_KEY secret; without it the
# sync stores the static schedule seed.
[triggers]
crons = ["0 */2 * * *"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[routes]]
pattern = "oraclemirror.com"
custom_domain = true

[[routes]]
pattern = "www.oraclemirror.com"
custom_domain = true
