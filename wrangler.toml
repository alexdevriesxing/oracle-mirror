name = "oracle-mirror"
main = "dist/index.js"
compatibility_date = "2024-12-01"

[ai]
binding = "AI"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[routes]]
pattern = "oraclemirror.com"
custom_domain = true

[[routes]]
pattern = "www.oraclemirror.com"
custom_domain = true
